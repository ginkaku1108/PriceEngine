                  <Pill variant="blue"><i className="ti ti-map" aria-hidden="true" style={{ fontSize:11 }} /> {s.region}</Pill>
                  <Pill variant="green"><i className="ti ti-building-store" aria-hidden="true" style={{ fontSize:11 }} /> {s.canal}</Pill>
                  <Pill variant="gray"><i className="ti ti-map-pin" aria-hidden="true" style={{ fontSize:11 }} /> {s.zona.plaza}</Pill>
                  <Pill variant="teal"><i className="ti ti-currency-dollar" aria-hidden="true" style={{ fontSize:11 }} /> Base SKU S/ {precioBaseResumen}</Pill>
                </div>
              </div>
              <button onClick={()=>setS(initState())} style={{ fontSize:12, padding:"7px 12px", borderRadius:"var(--border-radius-md)", border:"0.5px solid var(--color-border-secondary)", background:"none", cursor:"pointer", color:"var(--color-text-secondary)", display:"flex", alignItems:"center", gap:5 }}>
                <i className="ti ti-refresh" aria-hidden="true" style={{ fontSize:13 }} /> Reiniciar
              </button>
            </div>

            <div style={{ display:"flex", gap:0, marginBottom:28, borderBottom:"0.5px solid var(--color-border-tertiary)" }}>
              {STEPS.map((st,i)=>{
                const done = completado(i);
                const active = step===i;
                return (
                  <button key={i} onClick={()=>setStep(i)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4, padding:"10px 6px 12px", background:"none", border:"none", borderBottom: active?"2px solid var(--color-text-primary)":"2px solid transparent", cursor:"pointer" }}>
                    <div style={{ width:30, height:30, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", background: active?"var(--color-background-secondary)": done?"#EAF3DE":"transparent", border: active?"0.5px solid var(--color-border-secondary)": done?"0.5px solid #C0DD97":"none" }}>
                      {done && !active
                        ? <i className="ti ti-check" aria-hidden="true" style={{ fontSize:13, color:"#27500A" }} />
                        : <i className={`ti ${st.icon}`} aria-hidden="true" style={{ fontSize:14, color: active?"var(--color-text-primary)":"var(--color-text-tertiary)" }} />
                      }
                    </div>
                    <span style={{ fontSize:11, fontWeight: active?500:400, color: active?"var(--color-text-primary)":"var(--color-text-tertiary)", whiteSpace:"nowrap" }}>{st.label}</span>
                  </button>
                );
              })}
            </div>

            <div style={{ minHeight:320 }}>
              {comps[step]}
            </div>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:28, paddingTop:16, borderTop:"0.5px solid var(--color-border-tertiary)" }}>
              <button onClick={()=>setStep(Math.max(0,step-1))} disabled={step===0}
                style={{ display:"flex", alignItems:"center", gap:6, fontSize:13, padding:"8px 16px", borderRadius:"var(--border-radius-md)", border:"0.5px solid var(--color-border-secondary)", background:"none", cursor:step===0?"not-allowed":"pointer", opacity:step===0?0.35:1, color:"var(--color-text-primary)" }}>
                <i className="ti ti-arrow-left" aria-hidden="true" style={{ fontSize:14 }} /> Anterior
              </button>
              <div style={{ display:"flex", gap:5 }}>
                {STEPS.map((_,i)=>(
                  <div key={i} onClick={()=>setStep(i)} style={{ width: step===i?20:6, height:6, borderRadius:3, background: step===i?"var(--color-text-primary)": completado(i)?"var(--color-border-secondary)":"var(--color-border-tertiary)", cursor:"pointer", transition:"width 0.2s" }} />
                ))}
              </div>
              {step < STEPS.length-1
                ? <button onClick={()=>setStep(step+1)}
                    style={{ display:"flex", alignItems:"center", gap:6, fontSize:13, fontWeight:500, padding:"8px 16px", borderRadius:"var(--border-radius-md)", border:"0.5px solid var(--color-border-info)", background:"var(--color-background-info)", cursor:"pointer", color:"var(--color-text-info)" }}>
                    Siguiente <i className="ti ti-arrow-right" aria-hidden="true" style={{ fontSize:14 }} />
                  </button>
                : <button style={{ display:"flex", alignItems:"center", gap:6, fontSize:13, fontWeight:500, padding:"8px 16px", borderRadius:"var(--border-radius-md)", border:"0.5px solid #C0DD97", background:"#EAF3DE", cursor:"pointer", color:"#27500A" }}>
                    <i className="ti ti-check" aria-hidden="true" style={{ fontSize:14 }} /> Guardar estrategia
                  </button>
              }
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
